name: Build Linux App

# Ported from ChromIQ's build-linux.yml, minus libcups2-dev/pycups
# (no printing in the chart designer).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.0.0-beta.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact: ChromIQPatches-Linux-x86_64.tar.gz
            runner: ubuntu-latest

          - arch: aarch64
            artifact: ChromIQPatches-Linux-aarch64.tar.gz
            runner: ubuntu-24.04-arm

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0  # need full history + tags for the release-notes fallback

      # Qt platform-plugin runtime deps so the bundled app can launch.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xkb1 \
            libdbus-1-3 \
            libfontconfig1 \
            libxrender1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: python -m PyInstaller ChromIQPatches.spec

      - name: Inspect built binary
        run: |
          # Don't launch the GUI — no DISPLAY on the runner and no --help exit,
          # so executing it would hang the job. Verify the bootloader instead.
          file dist/ChromIQPatches/ChromIQPatches
          test -x dist/ChromIQPatches/ChromIQPatches
          ls -lh dist/ChromIQPatches/ChromIQPatches

      - name: Package as tar.gz
        run: |
          tar -C dist -czf "${{ matrix.artifact }}" ChromIQPatches
          ls -lh "${{ matrix.artifact }}"

      - name: Create GitHub Release (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$RELEASE_TAG"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-alpha*|*-beta*|*-rc*|*-pre*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            body=$(awk "/^## ${TAG}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null | sed '/^[[:space:]]*$/d' || true)
            if [ -z "$body" ]; then
              PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
              if [ -n "$PREV_TAG" ]; then
                COMMITS=$(git log --pretty=format:'- %s' "${PREV_TAG}..${TAG}")
                body=$(printf '### Changes since %s\n%s' "$PREV_TAG" "$COMMITS")
              else
                COMMITS=$(git log --pretty=format:'- %s' "$TAG")
                body=$(printf '### Changes\n%s' "$COMMITS")
              fi
            fi
            {
              printf '%s\n\n---\n' "$body"
              printf '**Installation (Linux):** Download the tarball for your architecture '
              printf '(x86_64 for most desktops/laptops, aarch64 for ARM systems). '
              printf 'Extract with `tar xzf ChromIQPatches-Linux-*.tar.gz`, then run '
              printf '`./ChromIQPatches/ChromIQPatches`. ArgyllCMS is NOT required.\n\n'
              printf '---\n☕ ChromIQ Patches is free and always will be — if it saves you time, a coffee is a kind way to say thanks. Completely optional, and the app stays fully featured either way.\n\n'
              printf '[![Support ChromIQ Patches on Ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/itsab1989)\n'
            } > /tmp/release_notes.txt
            gh release create "$TAG" \
              --title "ChromIQ Patches $TAG" \
              --notes-file /tmp/release_notes.txt \
              $PRERELEASE_FLAG 2>/dev/null || true
          fi

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Version-stamp the asset filename so downloads don't collide and the
          # download-stats dashboard can classify by platform/arch tokens.
          ART="${{ matrix.artifact }}"
          VERSIONED="${ART%.tar.gz}_${RELEASE_TAG}.tar.gz"
          mv "$ART" "$VERSIONED"
          gh release upload "$RELEASE_TAG" "$VERSIONED" --clobber
